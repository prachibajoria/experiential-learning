<html>
<head>
    <title>La Pasta Bella</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background: #fff5f7;
            scroll-behavior: smooth;
        }
        .navbar {
            background: rgba(255,192,203,0.6);
            backdrop-filter: blur(10px);
        }
        .hero {
            height: 100vh;
            background: url('https://images.unsplash.com/photo-1554118811-1e0d58224f24') no-repeat center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .hero-box {
            background: rgba(255,255,255,0.7);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
        }
        h1 {
            color: #ff4d88;
        }
        .btn-custom {
            background: linear-gradient(45deg, #ff7eb3, #ff4d88);
            color: white;
            border-radius: 25px;
        }
        .btn-custom:hover {
            transform: scale(1.1);
        }
        section {
            padding: 60px 0;
        }
        .card {
            border: none;
            border-radius: 20px;
            background: #ffe6eb;
            box-shadow: 0 4px 15px rgba(255,77,136,0.2);
            transition: 0.3s;
        }
        .card:hover {
            transform: translateY(-10px);
        }
        .gallery img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 15px;
            transition: 0.3s;
        }
        .gallery img:hover {
            transform: scale(1.05);
        }
        .form-box {
            background: #fff0f5;
            padding: 30px;
            border-radius: 20px;
        }
        footer {
            background: #ff4d88;
            color: white;
            padding: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
<nav class="navbar fixed-top">
    <div class="container">
        <a class="navbar-brand" href="#">💖 La Pasta Bella</a>
        <div>
            <a class="nav-link text-dark" href="#home">Home</a>
            <a class="nav-link text-dark" href="#menu">Menu</a>
            <a class="nav-link text-dark" href="#gallery">Gallery</a>
            <a class="nav-link text-dark" href="#reserve">Reserve</a>
        </div>
    </div>
</nav>
<section id="home" class="hero">
    <div class="hero-box">
        <h1>Good Food 💕 Great Vibes</h1>
        <p>Welcome to our aesthetic pink café ☕✨</p>
        <a href="#menu" class="btn btn-custom">Explore Menu</a>
    </div>
</section>
<section id="menu">
<div class="container text-center">
    <h2 class="mb-4">Our Menu</h2>
    <div class="row">
        <div class="col-md-3">
            <div class="card p-3">
                <h5>Pizza</h5>
                <p>₹200</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card p-3">
                <h5>Pasta</h5>
                <p>₹220</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card p-3">
                <h5>Burger</h5>
                <p>₹180</p>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3">
                <h5>Coffee</h5>
                <p>₹120</p>
            </div>
        </div>
    </div>
</div>
</section>
<section id="gallery">
<div class="container text-center gallery">
    <h2 class="mb-4">Gallery</h2>
    <div class="row">
        <div class="col-md-4">
            <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93">
        </div>
        <div class="col-md-4">
            <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085">
        </div>
        <div class="col-md-4">
            <img src="https://images.unsplash.com/photo-1519681393784-d120267933ba">
        </div>
    </div>
</div>
</section>
<section id="reserve">
<div class="container text-center">
    <h2 class="mb-4">Book a Table</h2>
    <div class="form-box mx-auto" style="width:50%">
        <input type="text" class="form-control mb-3" placeholder="Your Name">
        <input type="date" class="form-control mb-3">
        <input type="time" class="form-control mb-3">
        <input type="number" class="form-control mb-3" placeholder="People">
        <button class="btn btn-custom w-100">Reserve</button>
    </div>
</div>
</section>
<footer>
    <p>© 2026 La Pasta Bella 💖 by Prachi Bajoria</p>
</footer>
</body>
</html>
